<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ Lý Bảo Hiểm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="page-bg">
    <div class="chat-wrapper">

        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <div class="bot-avatar">
                    <svg viewBox="0 0 24 24" fill="white" width="20" height="20">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <div class="header-info">
                    <h2>Trợ Lý Bảo Hiểm</h2>
                    <span class="online-status">
                        <span class="status-dot"></span>
                        Đang hoạt động
                    </span>
                </div>
            </div>
            <div class="header-right">
                <div class="header-badge">24/7</div>
            </div>
            <!-- ===== Upload PDF ===== -->
            <div class="upload-area">
                <input type="file" id="pdf-file" accept="application/pdf" hidden />
                
                <button class="upload-btn" onclick="document.getElementById('pdf-file').click()">
                    📄 Tải PDF
                </button>

                <span id="upload-status" class="upload-status"></span>
            </div>
        </div>

        <!-- Chat box -->
        <div class="chat-box" id="chat-box">
            <div class="message-row bot-row">
                <div class="avatar bot-av">BH</div>
                <div class="bubble-wrap">
                    <div class="message bot">
                        Xin chào! Tôi là trợ lý tư vấn bảo hiểm của bạn. Tôi có thể giúp bạn tìm hiểu về các gói bảo hiểm <strong>sức khỏe</strong>, <strong>nhân thọ</strong>, <strong>xe cộ</strong> và nhiều hơn nữa.<br><br>Bạn cần tư vấn gì hôm nay?
                    </div>
                    <span class="msg-time">09:00</span>
                </div>
            </div>
        </div>


        <!-- Input area -->
        <div class="input-area">
            <input
                type="text"
                id="user-input"
                class="user-input"
                placeholder="Nhập câu hỏi của bạn..."
                onkeydown="if(event.key==='Enter') sendMessage()"
                autocomplete="off"
            />
            <button class="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="white" width="18" height="18">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
